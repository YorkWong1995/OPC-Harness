[workflow]
roles = ["architect"]
ceo_review = false
auto_confirm = false
profile = "default"

[roles]
architect = true
ceo = false
ops = false
growth = false

[cost]
estimate_enabled = false
currency = "USD"
pricing_source = "user-configured"

# 成本估算默认关闭；如需启用，请自行维护模型价格，单位为每百万 token。
# [cost.model_prices."claude-sonnet-4-6"]
# input_per_million = 0.0
# output_per_million = 0.0

[profile.full]
[profile.full.workflow]
roles = ["all"]
ceo_review = true

[profile.minimal]
[profile.minimal.roles]
architect = false
ceo = false
ops = false
growth = false

# embedded profile: 保持最小 PM → Engineer → QA 主链路并跳过 architect 阶段
# 使用方式: opc run --profile embedded
[profile.embedded]
[profile.embedded.roles]
architect = false
