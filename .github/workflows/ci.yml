name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[faiss,bge]" pytest pytest-cov

      - name: Syntax check
        run: python -m compileall src tests

      - name: Run tests with coverage
        run: python -m pytest --cov=opc --cov-report=term-missing --cov-fail-under=80
